# Mode
Mode="Uinput (Smooth)"
# Input Method
InputMethod=VNI
# Output Charset
OutputCharset=Unicode
# Enable Spell Check
SpellCheck=False
# Enable Macro
EnableMacro=False
# Capitalize Macro
CapitalizeMacro=False
# Auto capitalize after sentence-ending punctuation (. ! ? Enter) (experimental)
AutoCapitalizeAfterPunctuation=False
# Double Space to Period (experimental)
DoubleSpaceToPeriod=False
# Type w to Produce ư
W2U=False
# Auto Restore Keys With Invalid Words
AutoNonVnRestore=False
# Use oà, uý (Instead Of òa, úy)
ModernStyle=True
# Allow Type With More Freedom
FreeMarking=True
# Allow dd To Produce đ When Auto Restore Keys With Invalid Words Is On
DdFreeStyle=True
# Fix Uinput Mode With Ack
FixUinputWithAck=True
# Use Lotus Status Icons
UseLotusIcons=True
# Use Black Default Icons
UseBlackDefaultIcons=False
# Enable Custom Dictionary
EnableDictionary=False
# Enable Custom Keymap
EnableCustomKeymap=False
# Show Uinput (Smooth)
ShowModeSmooth=True
# Show Uinput (Slow)
ShowModeUinput=True
# Show Minecraft
ShowModeMinecraft=True
# Show Surrounding Text
ShowModeSurroundingText=True
# Show Preedit
ShowModePreedit=True
# Show Emoji Picker
ShowModeEmoji=True
# Show OFF
ShowModeOff=True
# Show Default Typing
ShowModeDefault=True
# Time Format ($TIME in macro)
TimeFormat=%H:%M
# Date Format ($DATE in macro)
DateFormat=%d/%m/%Y

[ModeMenuKey]
0=grave

